name: Desktop Release

on:
  push:
    tags:
      - 'desktop-v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: >
            aarch64-apple-darwin
            x86_64-apple-darwin

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: |
          cd apps/desktop
          npm install

      # icons/ holds only a README in git; generate the binary icon set (icns/ico/png)
      # from the web PWA logo so `tauri build` finds every file in tauri.conf.json.
      - name: Generate app icons
        run: |
          cd apps/desktop
          npx @tauri-apps/cli icon ../web/public/icons/icon-512.png

      - name: Build macOS (unsigned)
        run: |
          cd apps/desktop
          npm run build:universal
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      # Tauri's default DMG name is "Taproot POS_1.0.0_universal.dmg"; the API
      # /download/mac redirect expects "taproot-pos.dmg".
      - name: Rename DMG to match download redirect
        run: |
          cd apps/desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg
          src=$(ls *.dmg | head -n1)
          cp "$src" taproot-pos.dmg
          ls -la

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: taproot-macos
          path: |
            apps/desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg/taproot-pos.dmg

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg/taproot-pos.dmg
          draft: true
          generate_release_notes: true

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: |
          cd apps/desktop
          npm install

      - name: Generate app icons
        run: |
          cd apps/desktop
          npx @tauri-apps/cli icon ../web/public/icons/icon-512.png

      - name: Build Windows
        run: |
          cd apps/desktop
          npm run build:win

      # build:win targets x86_64-pc-windows-msvc, so artifacts land under the
      # target-triple subdir (NOT target/release). Rename the NSIS installer to
      # "taproot-pos-setup.exe" to match the API /download/win redirect.
      - name: Rename installer to match download redirect
        shell: pwsh
        run: |
          cd apps/desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis
          $src = Get-ChildItem *.exe | Select-Object -First 1
          Copy-Item $src.FullName taproot-pos-setup.exe
          Get-ChildItem

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: taproot-windows
          path: |
            apps/desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/taproot-pos-setup.exe
            apps/desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/taproot-pos-setup.exe
            apps/desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
          draft: true
          generate_release_notes: true
