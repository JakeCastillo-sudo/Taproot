<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0"/>
  <title>Taproot POS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; }
    #loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #1D9E75;
      flex-direction: column;
      gap: 16px;
    }
    #loading h1 {
      color: white;
      font-family: -apple-system, sans-serif;
      font-size: 28px;
      font-weight: 700;
    }
    #loading p {
      color: rgba(255,255,255,0.8);
      font-family: -apple-system, sans-serif;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: none;
    }
  </style>
</head>
<body>
  <div id="loading">
    <h1>🌿 Taproot POS</h1>
    <p>Loading...</p>
  </div>
  <iframe
    id="app"
    src="https://taproot-pos.com"
    onload="document.getElementById('loading')
      .style.display='none';
      this.style.display='block';"
  ></iframe>
  <script type="module" src="./main.ts"></script>
</body>
</html>
